<!DOCTYPE html>
<html>
<head>
    <title>NSSV News</title>
    <style>
        body {
            background-color: #E1D9D1;
            font-family: Arial, sans-serif;
            text-align: center;
            color: orange;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin: 20px 0;
        }
        .marquee-container {
            background-color: #FFD700;
            padding: 10px;
            display: inline-block;
            width: 100%;
        }
        marquee {
            color: #000080;
            font-weight: bold;
        }
        .link {
            display: inline-block;
            text-decoration: none;
            color: #FF5841;
            font-size: 18px;
            margin-top: 20px;
        }
        img {
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <h1>Hello! User</h1>

    <div class="marquee-container">
        <marquee direction="left" scrollamount="10" loop="infinite">
            <h1>
                <img src="NSSV.png" alt="Logo" width="100px">
                Welcome to NSSV News
            </h1>
        </marquee>
    </div>

    <a href="Mainpage.html" class="link">Click here to visit our website</a>

</body>
</html>
